<div class="verify-wrap">
  <h2 class="title">Verify Alumni</h2>
  <p class="sub">Approve or reject accounts created from Sign Up.</p>

  <!-- ✅ show loading while pendingUsers$ has not emitted yet -->
  <ng-container *ngIf="(pendingUsers$ | async) as pendingUsers; else loadingTpl">
    <div class="card">
      <table class="tbl">
        <thead>
          <tr>
            <th>School ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th class="right">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let u of pendingUsers">
            <td>{{ u.schoolId }}</td>
            <td>{{ u.fullName }}</td>
            <td>{{ u.email }}</td>
            <td class="right">
              <button class="btn verify" (click)="approve(u)">✓ Verify</button>
              <button class="btn reject" (click)="reject(u)">Reject</button>
            </td>
          </tr>

          <tr *ngIf="pendingUsers.length === 0">
            <td colspan="4" class="empty">No pending alumni to verify.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>

  <ng-template #loadingTpl>
    <div class="loading">Loading...</div>
  </ng-template>
</div>
